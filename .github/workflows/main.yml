name: Adaptive DevSecOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ FULL GIT HISTORY FIX
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # ✅ DETECT CHANGES (SAFE VERSION)
    - name: Detect Changes
      id: changes
      run: |
        if git rev-parse HEAD^ >/dev/null 2>&1; then
          CHANGED=$(git diff --name-only HEAD^ HEAD)
        else
          CHANGED=$(git ls-files)
        fi
        echo "files=$CHANGED"
        echo "files=$CHANGED" >> $GITHUB_OUTPUT

    # ✅ DECIDE MODE (SMART)
    - name: Decide Pipeline Mode
      id: mode
      run: |
        FILES="${{ steps.changes.outputs.files }}"
        echo "Changed files: $FILES"

        if echo "$FILES" | grep -E "templates|static|css|js"; then
          echo "mode=light" >> $GITHUB_OUTPUT
        elif echo "$FILES" | grep -E "views|models|forms|urls|settings"; then
          echo "mode=full" >> $GITHUB_OUTPUT
        else
          echo "mode=medium" >> $GITHUB_OUTPUT
        fi

    # ✅ SHOW MODE (for logs/report)
    - name: Print Mode
      run: echo "Pipeline Mode = ${{ steps.mode.outputs.mode }}"

    # ✅ PYTHON SETUP
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.12

    # ✅ CACHE (VERY IMPORTANT FOR PERFORMANCE)
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # ✅ INSTALL DEPENDENCIES
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # ✅ ADAPTIVE TEST EXECUTION
    - name: Run Tests (Full)
      if: steps.mode.outputs.mode == 'full'
      run: python manage.py test

    - name: Run Tests (Medium)
      if: steps.mode.outputs.mode == 'medium'
      run: python manage.py test blog

    - name: Skip Tests (Light)
      if: steps.mode.outputs.mode == 'light'
      run: echo "Skipping tests for UI-only changes"

    # ✅ SONARQUBE (ADAPTIVE)
    - name: SonarQube Scan (Full)
      if: steps.mode.outputs.mode == 'full'
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    - name: SonarQube Scan (Medium)
      if: steps.mode.outputs.mode == 'medium'
      uses: SonarSource/sonarqube-scan-action@v2
      with:
        args: >
          -Dsonar.sources=blog
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    - name: Skip Scan (Light)
      if: steps.mode.outputs.mode == 'light'
      run: echo "Skipping SonarQube for UI changes"

    # ✅ SAFE DEPLOY (ONLY IF SUCCESS)
    - name: Deploy to EC2
      if: success()
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          cd glowblog
          git pull
          source venv/bin/activate
          pip install -r requirements.txt
          sudo systemctl restart gunicorn

    # ✅ LOG COMPLETION
    - name: Pipeline Complete
      run: echo "Adaptive pipeline executed successfully 🚀"
