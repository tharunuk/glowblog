{% extends 'blog/base.html' %}

{% block content %}
<div style="max-width: 700px; margin: 2rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;">{{ title }}</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        {% for error in field.errors %}
                            <small style="color: var(--accent);">{{ error }}</small>
                        {% endfor %}
                    {% endif %}
                </div>
            {% endfor %}
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Save Post</button>
                <a href="{% url 'index' %}" class="btn btn-outline" style="flex: 1; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
