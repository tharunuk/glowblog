{% extends 'blog/base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ user.profile.profile_pic.url }}" alt="Profile" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 1rem;">
            <h2>{{ user.username }}</h2>
            <p class="text-muted">{{ user.email }}</p>
        </div>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Update Profile</h3>
            {% for field in u_form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            {% for field in p_form %}
                <div class="form-group">
                    <label>{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; padding: 1rem;">Update Profile</button>
        </form>
    </div>
</div>
{% endblock %}
